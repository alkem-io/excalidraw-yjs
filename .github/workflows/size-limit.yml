name: "Bundle Size check @excalidraw-yjs/excalidraw"
on:
  pull_request:
    branches:
      - master
jobs:
  size:
    runs-on: ubuntu-latest
    env:
      CI_JOB_NUMBER: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20.x
          cache: pnpm
      # pnpm installs the whole workspace from any sub-package dir.
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
        working-directory: packages/excalidraw
        env:
          CI: true
      - uses: andresz1/size-limit-action@e7493a72a44b113341c0cf6186ab49c17c4b65c1 # v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          build_script: build:esm
          skip_step: install
          directory: packages/excalidraw
